              required: [fk_id_votacion, tipo_voto, fk_id_lista]
              properties:
                fk_id_votacion: { type: integer, example: 1 }
                fk_id_lista:
                  type: integer
                  nullable: true
                  description: Identificador de la lista. Debe ser null si el voto es blanco o nulo.
                tipo_voto:
                  type: string
                  enum: ["valido", "blanco", "nulo"]
      responses:
        '201':
          description: Voto registrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Voto' }
        '401': { $ref: '#/components/responses/NoAutenticado' }
        '422': { $ref: '#/components/responses/ValidacionFallida' }

  /votos/resultados/{votacionId}:
    get:
      tags: [Votos]
      summary: Escrutinio agregado de una votación
      parameters:
        - name: votacionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Conteo por opción
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    opcion:      { type: string, description: Nombre de la lista, o "blanco"/"nulo" }
                    total_votos: { type: integer }
        '401': { $ref: '#/components/responses/NoAutenticado' }

  /health:
    get:
      tags: [Sistema]
      summary: Verificación de disponibilidad del servicio
      security: []
      responses:
        '200':
          description: Servicio operativo
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    NoAutenticado:
      description: Token ausente, inválido o expirado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    SinPermiso:
      description: El usuario autenticado no tiene rol admin
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NoEncontrado:
      description: El recurso solicitado no existe
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    SolicitudInvalida:
      description: Faltan campos obligatorios en la solicitud
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidacionFallida:
      description: El cuerpo de la solicitud no supera la validación
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }

    Votacion:
      type: object
      properties:
        id_votacion:     { type: integer }
        titulo_papeleta: { type: string }
        fecha_apertura:  { type: string, format: date-time }
        fecha_cierre:    { type: string, format: date-time }
        estado:          { type: string, example: abierta }
        id_proceso:      { type: integer }
        nombre_proceso:  { type: string }

    Voto:
      type: object
      properties:
        id_voto:         { type: integer }
        tipo_voto:       { type: string, enum: ["valido", "blanco", "nulo"] }
        fecha_hora:      { type: string, format: date-time }
        id_votacion:     { type: integer }
        titulo_papeleta: { type: string }
        id_lista:        { type: integer, nullable: true }
        nombre_lista:    { type: string, nullable: true }

    FacultadInput:
      type: object
      required: [nombre_facultad]
      properties:
        nombre_facultad:
          type: string
          maxLength: 100

    Facultad:
      type: object
      properties:
        id_facultad:
          type: integer
        nombre_facultad:
          type: string
          maxLength: 100

    DirectorInput:
