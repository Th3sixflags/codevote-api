openapi: 3.0.3
info:
  title: CodeVote API
  version: 1.1.0
  description: |
    API REST del sistema de votaciones estudiantiles CodeVote (UIDE).

    **Autenticación:** todos los endpoints salvo `/auth/login` y `/health`
    requieren un token JWT en la cabecera `Authorization: Bearer <token>`.
    Las operaciones de escritura (POST/PATCH/DELETE) requieren rol `admin`.
servers:
  - url: http://localhost:3000/api
    description: Desarrollo local
  - url: https://codevote.lat/api
    description: Producción
tags:
  - name: Autenticación
  - name: Facultades
  - name: Directores
  - name: Carreras
  - name: Responsables
  - name: Estudiantes
  - name: Procesos electorales
  - name: Cronogramas
  - name: Listas candidatas
  - name: Candidatos
  - name: Planes de trabajo
  - name: Requisitos
  - name: Validaciones de requisito
  - name: Códigos de voto
  - name: Actas de resultados
  - name: Veedores
  - name: Veedurías
  - name: Votaciones
  - name: Votos
  - name: Sistema

paths:
  /auth/login:
    post:
      tags: [Autenticación]
      summary: Inicia sesión y devuelve un token JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [correo_institucional, password]
              properties:
                correo_institucional:
                  type: string
                  format: email
                  example: schininin@uide.edu.ec
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: Autenticación correcta
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  usuario:
                    type: object
                    properties:
                      cedula:    { type: string }
                      nombres:   { type: string }
                      apellidos: { type: string }
                      rol:       { type: string, enum: ["estudiante", "admin"] }
        '400': { $ref: '#/components/responses/SolicitudInvalida' }
        '401': { $ref: '#/components/responses/NoAutenticado' }

  /facultades:
    get:
      tags: [Facultades]
      summary: Lista todos los registros
      responses:
        '200':
          description: Listado
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Facultad' }
        '401': { $ref: '#/components/responses/NoAutenticado' }
    post:
      tags: [Facultades]
      summary: Crea un registro (requiere rol admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FacultadInput' }
      responses:
        '201':
          description: Creado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Facultad' }
        '401': { $ref: '#/components/responses/NoAutenticado' }
        '403': { $ref: '#/components/responses/SinPermiso' }
        '422': { $ref: '#/components/responses/ValidacionFallida' }

  /facultades/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Facultades]
      summary: Obtiene un registro por su identificador
      responses:
        '200':
          description: Registro encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Facultad' }
        '401': { $ref: '#/components/responses/NoAutenticado' }
        '404': { $ref: '#/components/responses/NoEncontrado' }
    patch:
      tags: [Facultades]
      summary: Actualiza un registro (requiere rol admin)
      requestBody:
        required: true
